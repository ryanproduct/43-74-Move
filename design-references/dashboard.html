  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

see comment block at bottom of file)\n     ----------------------------------------------------------------- */\n  :root {\n    /* warm, residential palette — light */\n    --linen:      #F2EDE3;   /* page background */\n    --paper:     #FBF7EE;    /* card surface */\n    --paper-2:   #F7F1E4;    /* hover / inset */\n    --ink:       #28231D;    /* primary text */\n    --ink-2:     #4A433B;    /* heading subdued */\n    --stone:     #7A7167;    /* secondary text / meta */\n    --stone-2:   #A39A8E;    /* tertiary text */\n    --hairline:  #E3DBCB;    /* borders */\n    --hairline-2:#EDE6D6;    /* inner dividers */\n\n    --clay:      #C25A3F;    /* the one accent — terracotta */\n    --clay-soft: #F1D9CE;    /* clay tint background */\n    --moss:      #6A8264;    /* done / success */\n    --moss-soft: #DEE5D2;\n    --amber:     #B6863E;    /* blocked / warning (gentle) */\n    --amber-soft:#EFE1C2;\n    --slate:     #5C7A8E;    /* in progress / info */\n    --slate-soft:#D8E1E7;\n\n    color-scheme: light;\n  }\n  html.dark {\n    --linen:     #15120E;\n    --paper:     #1D1915;\n    --paper-2:   #25201B;\n    --ink:       #ECE3D2;\n    --ink-2:     #C9C0AF;\n    --stone:     #968D82;\n    --stone-2:   #6E665D;\n    --hairline:  #2E2823;\n    --hairline-2:#231F1A;\n\n    --clay:      #D67358;\n    --clay-soft: #3A241D;\n    --moss:      #9CB392;\n    --moss-soft: #243024;\n    --amber:     #D9A364;\n    --amber-soft:#3A2E1B;\n    --slate:     #8FAABF;\n    --slate-soft:#1F2A33;\n\n    color-scheme: dark;\n  }\n\n  html, body { background: var(--linen); color: var(--ink); }\n  body {\n    font-family: \"Source Sans 3\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", sans-serif;\n    font-feature-settings: \"ss01\", \"cv11\";\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\" 1, \"lnum\" 1; }\n\n  /* card */\n  .card {\n    background: var(--paper);\n    border: 1px solid var(--hairline);\n    border-radius: 14px;\n  }\n  .card-hd {\n    display:flex; align-items:baseline; justify-content:space-between;\n    padding: 18px 20px 8px 20px;\n  }\n  .card-hd h2 {\n    font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;\n    color: var(--stone);\n  }\n  .card-hd .meta { font-size: 12px; color: var(--stone-2); }\n  .card-body { padding: 4px 8px 10px 8px; }\n\n  /* row (Today / This week / Blocked) */\n  .row {\n    display: grid;\n    align-items: center;\n    gap: 12px;\n    padding: 10px 12px;\n    border-radius: 10px;\n    cursor: pointer;\n    transition: background 120ms ease;\n  }\n  .row:hover { background: var(--paper-2); }\n  .row + .row { border-top: 1px solid var(--hairline-2); border-radius: 0 0 10px 10px; }\n  .row + .row:hover { border-top-color: transparent; }\n  /* simpler: hairlines between, full radius on hover */\n  .list > * + * { border-top: 1px solid var(--hairline-2); }\n  .list > *:hover { border-top-color: transparent; }\n\n  .row-today    { grid-template-columns: 28px 1fr auto auto; }\n  .row-week     { grid-template-columns: 28px 36px 1fr auto auto; padding: 8px 12px; }\n  .row-blocked  { grid-template-columns: 28px 1fr auto; }\n  .row-activity { grid-template-columns: 24px 1fr auto; padding: 8px 12px; }\n\n  .title { color: var(--ink); font-size: 15px; font-weight: 500; line-height: 1.35; }\n  .title-sm { font-size: 14px; }\n  .meta { color: var(--stone); font-size: 13px; }\n\n  /* avatars */\n  .avatar {\n    width: 28px; height: 28px; border-radius: 999px;\n    display:inline-flex; align-items:center; justify-content:center;\n    font-size: 12px; font-weight: 600;\n    border: 1px solid transparent;\n  }\n  .avatar.sm { width: 24px; height: 24px; font-size: 11px; }\n  .av-R { background: var(--slate-soft); color: var(--slate); border-color: color-mix(in oklab, var(--slate) 30%, transparent); }\n  .av-E { background: var(--clay-soft); color: var(--clay); border-color: color-mix(in oklab, var(--clay) 30%, transparent); }\n\n  /* pills */\n  .pill {\n    display: inline-flex; align-items: center; gap: 6px;\n    font-size: 11.5px; font-weight: 500;\n    padding: 3px 9px; border-radius: 999px;\n    border: 1px solid transparent; white-space: nowrap;\n    line-height: 1.4;\n  }\n  .pill-prop {\n    background: transparent; color: var(--ink-2);\n    border-color: var(--hairline);\n    font-weight: 500; letter-spacing: 0.01em;\n  }\n  .pill-prop.new { color: var(--clay); border-color: color-mix(in oklab, var(--clay) 35%, var(--hairline)); }\n  .pill-status::before {\n    content:\"\"; width: 6px; height: 6px; border-radius: 999px; background: currentColor;\n    opacity: .85;\n  }\n  .st-todo     { color: var(--stone);  background: color-mix(in oklab, var(--stone) 8%, var(--paper)); border-color: var(--hairline); }\n  .st-progress { color: var(--slate);  background: var(--slate-soft); border-color: color-mix(in oklab, var(--slate) 22%, transparent); }\n  .st-waiting  { color: var(--amber);  background: var(--amber-soft); border-color: color-mix(in oklab, var(--amber) 22%, transparent); }\n  .st-blocked  { color: var(--amber);  background: var(--amber-soft); border-color: color-mix(in oklab, var(--amber) 30%, transparent); }\n  .st-done     { color: var(--moss);   background: var(--moss-soft);  border-color: color-mix(in oklab, var(--moss) 25%, transparent); }\n\n  /* countdowns */\n  .countdown {\n    position: relative;\n    background: var(--paper);\n    border: 1px solid var(--hairline);\n    border-radius: 16px;\n    padding: 22px 24px 20px 24px;\n    overflow: hidden;\n  }\n  .countdown.accent { background: linear-gradient(180deg, color-mix(in oklab, var(--clay-soft) 75%, var(--paper)) 0%, var(--paper) 70%); }\n  .countdown .label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--stone); }\n  .countdown .addr  { font-size: 22px; font-weight: 600; color: var(--ink) -progress .st { color: var(--slate); } .tile.t-progress .st::before { background: var(--slate); }\n  .tile.t-done     { background: var(--moss-soft);  border-color: color-mix(in oklab, var(--moss) 25%, transparent); }\n  .tile.t-done .st { color: var(--moss); } .tile.t-done .st::before { background: var(--moss); }\n\n  /* progress bar (projects) */\n  .pbar {\n    position: relative;\n    background: var(--hairline-2);\n    height: 6px; border-radius: 99px; overflow: hidden;\n  }\n  .pbar > i { position: absolute; inset: 0 auto 0 0; background: var(--moss); border-radius: 99px; }\n  .pbar.accent > i { background: var(--clay); }\n  .pbar.slate > i { background: var(--slate); }\n\n  /* top bar */\n  .topbar {\n    display: flex; align-items: center; gap: 16px;\n    padding: 14px 28px;\n    border-bottom: 1px solid var(--hairline);\n    background: color-mix(in oklab, var(--linen) 92%, var(--paper));\n    position: sticky; top: 0; z-index: 10;\n    backdrop-filter: saturate(120%) blur(6px);\n  }\n  .wordmark {\n    font-weight: 600; letter-spacing: -0.01em; font-size: 17px; color: var(--ink);\n    display: inline-flex; align-items: center; gap: 9px;\n  }\n  .wordmark .glyph {\n    width: 22px; height: 22px; border-radius: 6px;\n    background: var(--clay); color: #FBF7EE;\n    display:inline-flex; align-items:center; justify-content:center;\n    font-size: 13px; font-weight: 700;\n  }\n  .nav-link {\n    font-size: 14px; color: var(--stone); padding: 6px 10px; border-radius: 8px;\n  }\n  .nav-link.active { color: var(--ink); background: var(--paper-2); }\n  .nav-link:hover { color: var(--ink); }\n\n  .btn {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 8px 14px; border-radius: 9px;\n    font-size: 14px; font-weight: 500;\n    border: 1px solid transparent;\n    cursor: pointer;\n  }\n  .btn-primary { background: var(--clay); color: #FBF7EE; }\n  .btn-primary:hover { background: color-mix(in oklab, var(--clay) 90%, black); }\n  .btn-ghost { bac     <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer class=\"hairline-top pt-4 pb-10 flex items-center justify-between text-xs muted\">\n    <span>Move HQ · private · v0.1 reference mockup<\u002Fspan>\n    <span class=\"tnum\">Today is Mon, 18 May 2026<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fmain>\n\n<script>\n  // theme toggle — persists choice\n  (function () {\n    var root = document.documentElement;\n    var stored = localStorage.getItem('movehq.theme');\n    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;\n    if (stored === 'dark' || (stored === null && prefersDark)) root.classList.add('dark');\n    document.getElementById('themeToggle').addEventListener('click', function () {\n      root.classList.toggle('dark');\n      localStorage.setItem('movehq.theme', root.classList.contains('dark') ? 'dark' : 'light');\n    });\n  })();\n<\u002Fscript>\n\n<!--\n================================================================================\nMOVE HQ — DESIGN TOKENS (for Claude Code handoff)\n================================================================================\n\nFONT\n  Family:       \"Source Sans 3\", humanist sans-serif (Google Fonts)\n  Fallback:     ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", sans-serif\n  Weights used: 400, 500, 600, 700\n  Numerics:     tabular-nums on countdowns, dates, counts, progress fractions\n  Sizes (px):   11 meta-2 · 12 meta · 13 caption · 14 body-sm · 15 body · 17 wordmark\n                22 countdown-addr · 26 page-title · 88 countdown-headline\n\nCOLOUR — LIGHT\n  --linen      #F2EDE3   page background, warm cream\n  --paper      #FBF7EE   card surface (one step lighter than bg)\n  --paper-2    #F7F1E4   hover state on rows\n  --ink        #28231D   primary text (warm near-black, not pure)\n  --ink-2      #4A433B   subdued ink\n  --stone      #7A7167   secondary text, meta\n  --stone-2    #A39A8E   tertiary, hint\n  --hairline   #E3DBCB   card borders, dividers (outer)\n  --hairline-2 #EDE6D6   inner row dividers\n  --clay       #C25A3F   ACCENT — countdowns, primary CTA, key-date pill border\n  --clay-soft  #F1D9CE   accent tint for chip + countdown-A wash\n  --moss       #6A8264   done / success\n  --moss-soft  #DEE5D2   moss tint\n  --amber      #B6863E   blocked / waiting (gentle, not red)\n  --amber-soft #EFE1C2   amber tint\n  --slate      #5C7A8E   in progress / info (cool counterpoint)\n  --slate-soft #D8E1E7   slate tint\n\nCOLOUR — DARK\n  --linen      #15120E   page background\n  --paper      #1D1915   card surface\n  --paper-2    #25201B   hover state\n  --ink        #ECE3D2   primary text (warm cream, not white)\n  --ink-2      #C9C0AF\n  --stone      #968D82\n  --stone-2    #6E665D\n  --hairline   #2E2823\n  --hairline-2 #231F1A\n  --clay       #D67358   (lifted for dark contrast)\n  --clay-soft  #3A241D\n  --moss       #9CB392\n  --moss-soft  #243024\n  --amber      #D9A364\n  --amber-soft #3A2E1B\n  --slate      #8FAABF\n  --slate-soft #1F2A33\n\nSPACING SCALE (px)         RADIUS\n  2  4  6  8  10  12       6   small chips\n  14 16 18 20 24 28        9   buttons\n  32 40 48 56              10  row hover area\n                           12  utility tile\nPage padding: 28 horizontal · 28 vertical\nCard padding: 18 20 (hd), 8 (body insets), 12 row\nCard gap:     20 (gap-5 in Tailwind = 1.25rem)\n\nRADII\n  6   chips · pills\n  9   buttons\n  10  inner row hover · phone list items\n  12  utility tile · pbar end\n  14  cards\n  16  countdowns\n  28  phone frame\n\nELEVATION\n  No drop-shadows. Hairlines only (1px var(--hairline)).\n  One subtle accent wash on Countdown A (clay-soft → paper linear-gradient, 75% / 70%).\n\nCOMPONENT NOTES\n  Avatars:    28×28 (sm 24×24), 1px tinted border, initial letter, weight 600.\n              Ryan = slate-soft / slate text; Eleanor = clay-soft / clay text.\n  Property pills:\n              Default: transparent bg, hairline border, ink-2 text.\n              New property (74 Addison Way): clay text, clay-tinted border.\n  Status pills:\n              Pill with 6px dot prefix in currentColor (status colour).\n              to-do (stone) · in-progress (slate) · waiting (amber)\n              · blocked (amber, deeper border) · done (moss).\n  Rows:\n              Hover = bg var(--paper-2). Hairline-2 between rows; no row shadow.\n              Grid templates: Today 28/1fr/auto/auto · Week 28/36/1fr/auto/auto\n              · Blocked 28/1fr/auto · Activity 24/1fr/auto.\n  Countdowns:\n              88px tabular numeral, -0.04em letter-spacing.\n              3px × 64px accent bar above label, clay on A, slate on B.\n              Dot strip = visual progress through the 10-week move window\n              (use real day-count in production: filled = elapsed, faint = remaining).\n  Heatmap tile:\n              1:1 aspect, status-tinted bg, 13px name, 11px status,\n              hover translateY(-1px). No icons.\n  Blocked card:\n              Whole card gets a 35%-strength amber-soft wash so it's spottable\n              without the row treatment being alarming.\n\nINTERACTIONS\n  Hover row:     background → var(--paper-2), 120ms ease.\n  Hover tile:    translateY(-1px), 120ms ease.\n  Focus-visible: 2px outline in clay@70%, 2px offset.\n  Theme toggle:  top-right icon button, persists in localStorage('movehq.theme').\n                 Respects prefers-color-scheme on first visit.\n\nDO-NOT LIST\n  No drop shadows beyond hairlines.\n  No icon-as-decoration (icons only on status, theme toggle, + new task, wordmark).\n  No emoji in primary UI (small emoji-as-task-icon allowed in row content).\n  No gradients beyond the single subtle countdown wash + accent bar.\n================================================================================\n-->\n\n\n<\u002Fbody><\u002Fhtml>"
